<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Como Anotar - Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #09090b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .demo-container {
    width: 420px;
    height: 520px;
    background: #18181b;
    border-radius: 20px;
    border: 1px solid #27272a;
    overflow: hidden;
    position: relative;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }

  /* Header */
  .demo-header {
    text-align: center;
    padding: 20px 20px 12px;
    border-bottom: 1px solid #27272a;
  }
  .demo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 9px;
    color: #60a5fa;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .demo-badge .dot { width: 5px; height: 5px; background: #3b82f6; border-radius: 50%; }
  .demo-title { font-size: 14px; font-weight: 700; color: white; margin-top: 8px; }
  .demo-subtitle { font-size: 10px; color: #71717a; margin-top: 2px; }

  /* Content area */
  .demo-content {
    padding: 16px 20px;
    position: relative;
  }
  .text-line {
    height: 8px;
    background: #27272a;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .text-line.w-full { width: 100%; }
  .text-line.w-90 { width: 90%; }
  .text-line.w-80 { width: 80%; }
  .text-line.w-70 { width: 70%; }
  .text-line.w-60 { width: 60%; }
  .text-line.w-50 { width: 50%; }

  .section-title {
    height: 10px;
    background: #3f3f46;
    border-radius: 4px;
    margin: 16px 0 10px;
    width: 45%;
  }

  /* The selectable area */
  .highlight-zone {
    position: relative;
    display: inline;
  }
  .highlight-overlay {
    position: absolute;
    top: -2px;
    left: 0;
    right: 100%;
    bottom: -2px;
    background: rgba(59,130,246,0.25);
    border-radius: 3px;
    pointer-events: none;
    transition: right 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .highlight-overlay.active {
    right: 0;
  }

  /* Cursor */
  .cursor {
    position: absolute;
    width: 20px;
    height: 20px;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cursor.visible { opacity: 1; }
  .cursor svg { width: 20px; height: 20px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

  /* Anotar button */
  .anotar-btn {
    position: absolute;
    background: #2563eb;
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0;
    transform: translateY(4px) scale(0.9);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    z-index: 15;
  }
  .anotar-btn.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .anotar-btn svg { width: 10px; height: 10px; }

  /* Modal */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 30;
  }
  .modal-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: #18181b;
    border: 1px solid #3f3f46;
    border-radius: 16px;
    padding: 16px;
    width: 100%;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-overlay.visible .modal {
    transform: translateY(0) scale(1);
  }
  .modal-quote {
    border-left: 2px solid #3b82f6;
    padding-left: 10px;
    margin-bottom: 12px;
  }
  .modal-quote-label { font-size: 9px; color: #71717a; margin-bottom: 2px; }
  .modal-quote-text { font-size: 11px; color: #a1a1aa; font-style: italic; }
  .modal-input {
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 8px;
    padding: 8px 10px;
    width: 100%;
    color: white;
    font-size: 11px;
    margin-bottom: 10px;
    min-height: 48px;
    display: flex;
    align-items: flex-start;
  }
  .modal-input .typed-text { color: white; }
  .modal-input .cursor-blink {
    display: inline-block;
    width: 1px;
    height: 13px;
    background: #3b82f6;
    margin-left: 1px;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-cancel { font-size: 11px; color: #71717a; padding: 5px 10px; }
  .modal-submit {
    font-size: 11px;
    color: white;
    background: #2563eb;
    padding: 5px 14px;
    border-radius: 8px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .modal-submit.active { background: #1d4ed8; }

  /* Sidebar annotation */
  .sidebar-annotation {
    position: absolute;
    right: -8px;
    top: 185px;
    width: 0;
    overflow: hidden;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
  }
  .sidebar-annotation.visible {
    width: 140px;
    right: 12px;
  }
  .sidebar-card {
    background: rgba(24,24,27,0.9);
    border: 1px solid #27272a;
    border-radius: 10px;
    padding: 8px;
    width: 140px;
  }
  .sidebar-card .s-quote {
    border-left: 2px solid rgba(59,130,246,0.4);
    padding-left: 6px;
    margin-bottom: 6px;
    font-size: 8px;
    color: #71717a;
    font-style: italic;
    line-height: 1.4;
  }
  .sidebar-card .s-text {
    font-size: 9px;
    color: #a1a1aa;
    line-height: 1.4;
  }
  .sidebar-card .s-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 7px;
    color: #52525b;
  }

  /* Step indicator */
  .steps-bar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 40;
  }
  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3f3f46;
    transition: all 0.3s;
  }
  .step-dot.active { background: #3b82f6; width: 18px; border-radius: 3px; }

  .step-label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #71717a;
    white-space: nowrap;
    z-index: 40;
    transition: opacity 0.3s;
  }

  /* Success pulse */
  .success-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    opacity: 0;
    z-index: 50;
    background: rgba(9,9,11,0.9);
  }
  .success-ring.visible {
    opacity: 1;
    animation: pop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0.5); }
    70% { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .demo-container { width: 100%; height: 100vh; border-radius: 0; border: none; }
  }
</style>
</head>
<body>

<div class="demo-container">
  <!-- Header -->
  <div class="demo-header">
    <div class="demo-badge"><div class="dot"></div>PROPOSTA COMERCIAL</div>
    <div class="demo-title">Equipe de Emagrecimento com IA</div>
    <div class="demo-subtitle">Para Thales &middot; 09/03/2026</div>
  </div>

  <!-- Content mockup -->
  <div class="demo-content" id="content">
    <div class="section-title"></div>
    <div class="text-line w-full"></div>
    <div class="text-line w-90"></div>
    <div class="text-line w-80"></div>

    <div class="section-title" style="width:55%"></div>
    <!-- This is the line that gets highlighted -->
    <div class="text-line w-full" style="position:relative" id="target-line">
      <div class="highlight-overlay" id="highlight"></div>
    </div>
    <div class="text-line w-70"></div>
    <div class="text-line w-90"></div>
    <div class="text-line w-60"></div>

    <div class="section-title" style="width:40%"></div>
    <div class="text-line w-full"></div>
    <div class="text-line w-80"></div>
    <div class="text-line w-70"></div>
    <div class="text-line w-full"></div>
    <div class="text-line w-50"></div>
  </div>

  <!-- Cursor -->
  <div class="cursor" id="cursor">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5 3l14 8-6 2-4 6-4-16z" fill="white" stroke="#000" stroke-width="1"/>
    </svg>
  </div>

  <!-- Anotar button -->
  <div class="anotar-btn" id="anotar-btn">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
    Anotar
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-quote">
        <div class="modal-quote-label">Anotando sobre:</div>
        <div class="modal-quote-text">"Número de WhatsApp exclusivo..."</div>
      </div>
      <div class="modal-input">
        <span class="typed-text" id="typed-text"></span>
        <span class="cursor-blink" id="cursor-blink"></span>
      </div>
      <div class="modal-actions">
        <div class="modal-cancel">Cancelar</div>
        <div class="modal-submit" id="submit-btn">Enviar</div>
      </div>
    </div>
  </div>

  <!-- Sidebar annotation result -->
  <div class="sidebar-annotation" id="sidebar">
    <div class="sidebar-card">
      <div class="s-quote">"Número de WhatsApp exclusivo..."</div>
      <div class="s-text">Posso usar meu número pessoal?</div>
      <div class="s-meta">
        <span>Thales</span>
        <span>agora</span>
      </div>
    </div>
  </div>

  <!-- Success -->
  <div class="success-ring" id="success">&#10003;</div>

  <!-- Steps indicator -->
  <div class="step-label" id="step-label">Selecione um trecho do texto</div>
  <div class="steps-bar">
    <div class="step-dot" id="dot-0"></div>
    <div class="step-dot" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor')
const highlight = document.getElementById('highlight')
const anotarBtn = document.getElementById('anotar-btn')
const modal = document.getElementById('modal')
const typedText = document.getElementById('typed-text')
const submitBtn = document.getElementById('submit-btn')
const sidebar = document.getElementById('sidebar')
const success = document.getElementById('success')
const stepLabel = document.getElementById('step-label')
const cursorBlink = document.getElementById('cursor-blink')

const labels = [
  'Selecione um trecho do texto',
  'Clique em "Anotar"',
  'Escreva sua observação',
  'Anotação salva!'
]

function setStep(n) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById(`dot-${i}`)
    d.className = i === n ? 'step-dot active' : 'step-dot'
  }
  stepLabel.textContent = labels[n] || ''
}

function moveCursor(x, y, duration) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${duration}ms cubic-bezier(0.4,0,0.2,1), top ${duration}ms cubic-bezier(0.4,0,0.2,1)`
    cursor.style.left = x + 'px'
    cursor.style.top = y + 'px'
    setTimeout(resolve, duration)
  })
}

const typeMessage = 'Posso usar meu número pessoal?'

function typeText() {
  return new Promise(resolve => {
    let i = 0
    const interval = setInterval(() => {
      if (i < typeMessage.length) {
        typedText.textContent += typeMessage[i]
        i++
      } else {
        clearInterval(interval)
        resolve()
      }
    }, 50)
  })
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)) }

async function runAnimation() {
  // Reset
  cursor.className = 'cursor'
  highlight.className = 'highlight-overlay'
  anotarBtn.className = 'anotar-btn'
  modal.className = 'modal-overlay'
  sidebar.className = 'sidebar-annotation'
  success.className = 'success-ring'
  typedText.textContent = ''
  submitBtn.className = 'modal-submit'

  const targetLine = document.getElementById('target-line')
  const rect = targetLine.getBoundingClientRect()
  const container = document.querySelector('.demo-container').getBoundingClientRect()
  const lineX = rect.left - container.left
  const lineY = rect.top - container.top

  await sleep(600)

  // Step 0: Move cursor to text
  setStep(0)
  cursor.style.left = '200px'
  cursor.style.top = '100px'
  cursor.className = 'cursor visible'
  await sleep(300)
  await moveCursor(lineX + 20, lineY + 4, 600)
  await sleep(200)

  // Highlight text (simulate drag)
  highlight.className = 'highlight-overlay active'
  await moveCursor(lineX + rect.width - 30, lineY + 4, 800)
  await sleep(400)

  // Step 1: Show anotar button
  setStep(1)
  anotarBtn.style.left = (lineX + rect.width / 2 - 40) + 'px'
  anotarBtn.style.top = (lineY - 28) + 'px'
  anotarBtn.className = 'anotar-btn visible'
  await sleep(300)

  // Move cursor to button
  await moveCursor(lineX + rect.width / 2 - 10, lineY - 20, 500)
  await sleep(300)

  // Click effect
  cursor.style.transition = 'transform 0.1s'
  cursor.style.transform = 'scale(0.8)'
  await sleep(100)
  cursor.style.transform = 'scale(1)'
  await sleep(200)

  // Step 2: Show modal
  setStep(2)
  anotarBtn.className = 'anotar-btn'
  highlight.className = 'highlight-overlay'
  cursor.className = 'cursor'
  modal.className = 'modal-overlay visible'
  await sleep(500)

  // Type text
  await typeText()
  await sleep(400)

  // Click enviar
  submitBtn.className = 'modal-submit active'
  await sleep(200)

  // Step 3: Success
  setStep(3)
  modal.className = 'modal-overlay'
  success.className = 'success-ring visible'
  await sleep(800)
  success.className = 'success-ring'

  // Show sidebar annotation
  sidebar.className = 'sidebar-annotation visible'
  await sleep(2000)

  // Loop
  sidebar.className = 'sidebar-annotation'
  await sleep(500)
  runAnimation()
}

runAnimation()
</script>
</body>
</html>
